<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designs by J</title>

<style>
body {
margin:0;
font-family: Arial, sans-serif;
background:black;
color:white;
text-align:center;
}

.hero {
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1 {
color:red;
font-size:3rem;
}

p {
color:silver;
}

.section {
padding:60px 20px;
}

.card {
background:#111;
padding:20px;
margin:15px;
display:inline-block;
width:250px;
border-radius:10px;
box-shadow:0 0 25px red;
}

table {
width:80%;
margin:auto;
border-collapse:collapse;
box-shadow:0 0 30px red;
}

th {
background:red;
padding:15px;
border:5px solid red;
}

td {
padding:15px;
border:1px solid #333;
}

footer {
padding:20px;
border-top:2px solid red;
margin-top:40px;
}
</style>
</head>

<body>

<div class="hero">
<h1>Designs by J</h1>
<p>Affordable Professional Websites</p>
</div>

<div class="section">
<h2>Services</h2>
<div class="card">Website Design</div>
<div class="card">Logo Design</div>
<div class="card">SEO Optimization</div>
</div>

<div class="section">
<h2>Pricing</h2>
<table>
<tr><th>Plan</th><th>Price</th></tr>
<tr><td>Basic</td><td>$199</td></tr>
<tr><td>Standard</td><td>$399</td></tr>
<tr><td>Premium</td><td>$699</td></tr>
</table>
</div>

<footer>
<p>© Designs by J</p>
</footer>
<canvas id="globe"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
window.addEventListener("load", function() {

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("globe"), alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);

const geometry = new THREE.SphereGeometry(3, 32, 32);
const material = new THREE.MeshBasicMaterial({ wireframe:true, color: 0xff0000 });

const globe = new THREE.Mesh(geometry, material);
scene.add(globe);

camera.position.z = 5;

function animate() {
requestAnimationFrame(animate);
globe.rotation.y += 0.002;
renderer.render(scene, camera);
}

animate();

});
</script>

<style>
#globe {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}
</style>
</body>
</html>
