<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designs by J</title>

<style>
body {
margin:0;
font-family: Arial, sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero {
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
position:relative;
text-align:center;
}

h1 {
color:red;
font-size:3rem;
margin-bottom:10px;
}

p {
color:silver;
}

/* SIGNATURE OVERLAY (your original effect) */
.signature {
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
color:rgba(255,0,0,0.08);
letter-spacing:6px;
white-space:nowrap;
z-index:1;
pointer-events:none;
}

/* SERVICES */
.section {
padding:60px 20px;
text-align:center;
}

.card {
background:#111;
border:1px solid #333;
padding:20px;
margin:20px;
border-radius:10px;
display:inline-block;
width:250px;
box-shadow:0 0 25px rgba(255,0,0,.5);
}

/* PRICING */
table {
width:80%;
margin:auto;
border-collapse:collapse;
box-shadow:0 0 30px rgba(255,0,0,.7);
}

th {
background:red;
color:white;
padding:15px;
border:4px solid red;
}

td {
padding:15px;
border:1px solid #333;
}

/* FOOTER */
footer {
background:#000;
padding:20px;
margin-top:40px;
border-top:2px solid red;
color:silver;
}

/* GLOBE */
#globe {
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100%;
height:100%;
z-index:-1;
}
</style>

</head>

<body>

<div class="hero">
<h1>Designs by J</h1>

<div class="signature">Designs by J</div>

<p>Affordable Professional Websites</p>
</div>

<div class="section">
<h2>Services</h2>
<div class="card">Website Design</div>
<div class="card">Logo Design</div>
<div class="card">SEO Optimization</div>
</div>

<div class="section">
<h2>Pricing</h2>
<table>
<tr><th>Plan</th><th>Price</th></tr>
<tr><td>Basic</td><td>$199</td></tr>
<tr><td>Standard</td><td>$399</td></tr>
<tr><td>Premium</td><td>$699</td></tr>
</table>
</div>

<div class="section">
<h2>Contact</h2>
<p>Email: cross_face@live.com</p>
<p>Phone: (XXX) XXX-XXXX</p>
</div>

<footer>
<p>© Designs by J</p>
</footer>

<!-- GLOBE -->
<canvas id="globe"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
window.addEventListener("load", function() {

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("globe"), alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);

const geometry = new THREE.SphereGeometry(3, 32, 32);
const material = new THREE.MeshBasicMaterial({ wireframe:true, color: 0xff0000 });

const globe = new THREE.Mesh(geometry, material);
scene.add(globe);

camera.position.z = 5;

function animate() {
requestAnimationFrame(animate);
globe.rotation.y += 0.002;
renderer.render(scene, camera);
}

animate();

});
</script>

</body>
</html>
